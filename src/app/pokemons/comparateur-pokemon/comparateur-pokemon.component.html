<div class="row">
  <div class="col s12 m10 offset-m1">

    <div class="row valign-wrapper" style="gap:12px">
     <div class="col s5">
        <label>Pokémon 1</label>
        <select [(ngModel)]="pokemon1" style="display:block; width:100%; height:36px; border:1px solid #ccc; border-radius:4px; padding:0 8px; background:white; color:#333;">
          <option [ngValue]="null" disabled>-- Choisir --</option>
          @for (p of pokemons; track p.id) {
            <option [ngValue]="p">{{ p.name }}</option>
          }
        </select>
      </div>

      <div class="col s2 center">
        <strong>VS</strong>
      </div>

      <div class="col s5">
        <label>Pokémon 2</label>
        <select [(ngModel)]="pokemon2" style="display:block; width:100%; height:36px; border:1px solid #ccc; border-radius:4px; padding:0 8px; background:white; color:#333;">
          <option [ngValue]="null" disabled>-- Choisir --</option>
          @for (p of pokemons; track p.id) {
            <option [ngValue]="p">{{ p.name }}</option>
          }
        </select>
      </div>
    </div>

    <div class="center">
      <button class="btn waves-effect waves-light" (click)="comparer()"
        [disabled]="!pokemon1 || !pokemon2 || pokemon1 === pokemon2">
        <i class="material-icons left">compare_arrows</i> Comparer
      </button>
      <button class="btn waves-effect waves-light" style="margin-left: 3px;" (click)="reinitialiser()"
        [disabled]="!pokemon1 || !pokemon2 || pokemon1 === pokemon2">
        <i class="material-icons left">refresh</i> Réinitialiser
      </button>
    </div>

    @if (resultat && pokemon1 && pokemon2) {
      <div class="row" style="margin-top:1.5rem">
        @for (p of [pokemon1, pokemon2]; track p.id) {
          <div class="col s6">
            <div class="card" [class.green]="isWinner(p)" [class.lighten-4]="isWinner(p)">
              <div class="card-image">
                <img [src]="p.picture" style="width:80px;margin:auto;display:block">
              </div>
              <div class="card-content">
                <h5 class="center">{{ p.name }}</h5>
                <table class="striped">
                  <tr>
                    <td>HP</td>
                    <td><strong>{{ p.hp }}</strong></td>
                  </tr>
                  <tr>
                    <td>CP</td>
                    <td><strong>{{ p.cp }}</strong></td>
                  </tr>
                  <tr>
                    <td>Rareté</td>
                    <td><strong [innerHTML]="p.rarete | pokemonRarete"></strong></td>
                  </tr>
                  <tr>
                    <td>Types</td>
                    <td>{{ p.types.join(', ') }}</td>
                  </tr>
                </table>
              </div>
            </div>
            @if(isWinner(p)){
              <p class="green-text center"><strong><i class="material-icons">emoji_events</i> Vainqueur</strong></p>
            }
          </div>
        }
      </div>
    }

  </div>
</div>
